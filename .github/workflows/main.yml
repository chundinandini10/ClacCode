name: Fully Automated CI/CD Pipeline

on:
  push:
    branches: [ main ]

  schedule:
    - cron: "*/30 * * * *"   # runs every 30 minutes

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    # 🔹 Checkout code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔹 Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    # 🔹 Cache dependencies (updated version)

    # 🔹 Install dependencies + measure time
    - name: Install Dependencies
      run: |
        START=$(date +%s)

        python -m pip install --upgrade pip
        pip install -r requirements.txt

        END=$(date +%s)
        echo "INSTALL_TIME=$((END-START))" >> $GITHUB_ENV

    # 🔹 Run migrations
    - name: Run Migrations
      run: python manage.py migrate

    # 🔹 Run tests + measure time
    - name: Run Tests
      run: |
        START=$(date +%s)

        python manage.py test calculator

        END=$(date +%s)
        echo "TEST_TIME=$((END-START))" >> $GITHUB_ENV

    # 🔹 Save metrics
    - name: Save Metrics
      run: |
        echo "Run Time: $(date)" > metrics.txt
        echo "Install Time: $INSTALL_TIME sec" >> metrics.txt
        echo "Test Time: $TEST_TIME sec" >> metrics.txt
        echo "Status: SUCCESS" >> metrics.txt

    # 🔹 Upload metrics (FIXED VERSION)
    - name: Upload Metrics
      uses: actions/upload-artifact@v4
      with:
        name: metrics
        path: metrics.txt

    # 🚀 DEPLOY TO EC2 (CLEAN VERSION - NO SERVER START)
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ClacCode
          git pull origin main
          source venv/bin/activate
          pip install -r requirements.txt
          python manage.py migrate
          echo "Deployment completed successfully"
