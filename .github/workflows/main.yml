name: Fully Automated CI/CD Pipeline

on:
  push:
    branches: [ main ]

  schedule:
    - cron: "*/30 * * * *"

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        START=$(date +%s)

        python -m pip install --upgrade pip
        pip install -r requirements.txt

        END=$(date +%s)
        echo "INSTALL_TIME=$((END-START))" >> $GITHUB_ENV

    - name: Run Migrations
      run: python manage.py migrate

    - name: Run Tests
      run: |
        START=$(date +%s)

        python manage.py test calculator

        END=$(date +%s)
        echo "TEST_TIME=$((END-START))" >> $GITHUB_ENV

    - name: Save Metrics
      run: |
        echo "Run Time: $(date)" > metrics.txt
        echo "Install Time: $INSTALL_TIME sec" >> metrics.txt
        echo "Test Time: $TEST_TIME sec" >> metrics.txt
        echo "Status: SUCCESS" >> metrics.txt

    - name: Upload Metrics
      uses: actions/upload-artifact@v4
      with:
        name: metrics
        path: metrics.txt

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set +e   # 🔥 IMPORTANT: prevents script failure on signals

          cd ClacCode
          git pull origin main
          source venv/bin/activate
          pip install -r requirements.txt
          python manage.py migrate

          echo "Checking for existing server..."
          PIDS=$(pgrep -f runserver)

          if [ ! -z "$PIDS" ]; then
            echo "Stopping old server..."
            kill $PIDS
            sleep 2
          else
            echo "No existing server running"
          fi

          echo "Starting new server..."
          nohup python manage.py runserver 0.0.0.0:8000 > server.log 2>&1 &

          echo "Deployment + Restart completed"

          exit 0   # 🔥 FORCE SUCCESS
